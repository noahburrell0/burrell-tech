<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" fill="none">
  <!-- Central hexagon representing Argo CD -->
  <polygon points="250,40 310,75 310,145 250,180 190,145 190,75" fill="#EF7B4D" opacity="0.9"/>
  <polygon points="250,50 302,80 302,140 250,170 198,140 198,80" fill="#E96D3F" opacity="0.95"/>

  <!-- Inner circle with version number styling -->
  <circle cx="250" cy="110" r="38" fill="#1A1A2E" opacity="0.9"/>
  <text x="250" y="104" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#EF7B4D">3.3</text>
  <text x="250" y="122" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="400" fill="#AAAACC">RELEASE</text>

  <!-- Left feature node: PreDelete Hooks -->
  <line x1="190" y1="110" x2="105" y2="70" stroke="#EF7B4D" stroke-width="2" opacity="0.5"/>
  <circle cx="80" cy="58" r="28" fill="#1A1A2E" opacity="0.85"/>
  <circle cx="80" cy="58" r="28" fill="none" stroke="#EF7B4D" stroke-width="1.5" opacity="0.6"/>
  <!-- Trash/delete icon -->
  <rect x="71" y="50" width="18" height="14" rx="2" fill="none" stroke="#EF7B4D" stroke-width="1.5"/>
  <line x1="68" y1="50" x2="92" y2="50" stroke="#EF7B4D" stroke-width="1.5"/>
  <line x1="76" y1="53" x2="76" y2="61" stroke="#EF7B4D" stroke-width="1"/>
  <line x1="80" y1="53" x2="80" y2="61" stroke="#EF7B4D" stroke-width="1"/>
  <line x1="84" y1="53" x2="84" y2="61" stroke="#EF7B4D" stroke-width="1"/>
  <!-- Shield/hook overlay -->
  <path d="M87,43 L93,46 L93,52 C93,55 90,58 87,59 C84,58 81,55 81,52 L81,46 Z" fill="#4CAF50" opacity="0.8"/>
  <polyline points="83,50 86,53 91,47" fill="none" stroke="white" stroke-width="1.5"/>

  <!-- Right feature node: Source Hydrator -->
  <line x1="310" y1="110" x2="395" y2="70" stroke="#EF7B4D" stroke-width="2" opacity="0.5"/>
  <circle cx="420" cy="58" r="28" fill="#1A1A2E" opacity="0.85"/>
  <circle cx="420" cy="58" r="28" fill="none" stroke="#EF7B4D" stroke-width="1.5" opacity="0.6"/>
  <!-- Water drop / hydrator icon -->
  <path d="M420,42 C420,42 410,55 410,60 C410,66 414,70 420,70 C426,70 430,66 430,60 C430,55 420,42 420,42 Z" fill="none" stroke="#4FC3F7" stroke-width="1.5"/>
  <path d="M420,48 C420,48 414,57 414,60 C414,64 417,67 420,67" fill="#4FC3F7" opacity="0.3"/>

  <!-- Bottom-left feature node: Shallow Clone -->
  <line x1="210" y1="165" x2="130" y2="225" stroke="#EF7B4D" stroke-width="2" opacity="0.5"/>
  <circle cx="110" cy="240" r="28" fill="#1A1A2E" opacity="0.85"/>
  <circle cx="110" cy="240" r="28" fill="none" stroke="#EF7B4D" stroke-width="1.5" opacity="0.6"/>
  <!-- Git branch icon simplified -->
  <circle cx="104" cy="230" r="3" fill="none" stroke="#AB47BC" stroke-width="1.5"/>
  <circle cx="116" cy="230" r="3" fill="none" stroke="#AB47BC" stroke-width="1.5"/>
  <circle cx="110" cy="250" r="3" fill="none" stroke="#AB47BC" stroke-width="1.5"/>
  <line x1="104" y1="233" x2="110" y2="247" stroke="#AB47BC" stroke-width="1.5"/>
  <line x1="116" y1="233" x2="110" y2="247" stroke="#AB47BC" stroke-width="1.5"/>
  <!-- Speed lines -->
  <line x1="98" y1="237" x2="93" y2="237" stroke="#AB47BC" stroke-width="1" opacity="0.6"/>
  <line x1="97" y1="241" x2="91" y2="241" stroke="#AB47BC" stroke-width="1" opacity="0.4"/>
  <line x1="98" y1="245" x2="94" y2="245" stroke="#AB47BC" stroke-width="1" opacity="0.3"/>

  <!-- Bottom-right feature node: KEDA -->
  <line x1="290" y1="165" x2="370" y2="225" stroke="#EF7B4D" stroke-width="2" opacity="0.5"/>
  <circle cx="390" cy="240" r="28" fill="#1A1A2E" opacity="0.85"/>
  <circle cx="390" cy="240" r="28" fill="none" stroke="#EF7B4D" stroke-width="1.5" opacity="0.6"/>
  <!-- Scale/autoscale icon -->
  <line x1="377" y1="252" x2="403" y2="252" stroke="#66BB6A" stroke-width="1.5"/>
  <line x1="377" y1="252" x2="377" y2="228" stroke="#66BB6A" stroke-width="1.5"/>
  <!-- Bar chart -->
  <rect x="381" y="244" width="4" height="8" fill="#66BB6A" opacity="0.6"/>
  <rect x="387" y="238" width="4" height="14" fill="#66BB6A" opacity="0.7"/>
  <rect x="393" y="233" width="4" height="19" fill="#66BB6A" opacity="0.8"/>
  <rect x="399" y="241" width="4" height="11" fill="#66BB6A" opacity="0.65"/>

  <!-- Decorative orbit rings -->
  <ellipse cx="250" cy="150" rx="200" ry="55" fill="none" stroke="#EF7B4D" stroke-width="0.5" opacity="0.15" transform="rotate(-10, 250, 150)"/>
  <ellipse cx="250" cy="150" rx="220" ry="70" fill="none" stroke="#EF7B4D" stroke-width="0.5" opacity="0.1" transform="rotate(5, 250, 150)"/>

  <!-- Small decorative dots -->
  <circle cx="50" cy="150" r="2" fill="#EF7B4D" opacity="0.3"/>
  <circle cx="450" cy="150" r="2" fill="#EF7B4D" opacity="0.3"/>
  <circle cx="250" cy="280" r="2" fill="#EF7B4D" opacity="0.2"/>
  <circle cx="150" cy="20" r="1.5" fill="#EF7B4D" opacity="0.2"/>
  <circle cx="350" cy="20" r="1.5" fill="#EF7B4D" opacity="0.2"/>
  <circle cx="170" cy="270" r="1.5" fill="#EF7B4D" opacity="0.15"/>
  <circle cx="330" cy="270" r="1.5" fill="#EF7B4D" opacity="0.15"/>
</svg>
