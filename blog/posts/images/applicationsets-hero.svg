<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 260" width="600" height="260">
  <defs>
    <linearGradient id="centralGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EF7B4D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E85D26;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="appGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4BA3E3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2B7BBE;stop-opacity:1" />
    </linearGradient>

    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="glowSmall" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Connection lines (static dashed) -->
  <!-- Top row -->
  <line x1="222" y1="118" x2="105" y2="50" stroke="#EF7B4D" stroke-width="2" stroke-opacity="0.45" stroke-dasharray="6,4" />
  <line x1="300" y1="110" x2="300" y2="50" stroke="#EF7B4D" stroke-width="2" stroke-opacity="0.45" stroke-dasharray="6,4" />
  <line x1="378" y1="118" x2="495" y2="50" stroke="#EF7B4D" stroke-width="2" stroke-opacity="0.45" stroke-dasharray="6,4" />
  <!-- Bottom row -->
  <line x1="222" y1="148" x2="105" y2="218" stroke="#EF7B4D" stroke-width="2" stroke-opacity="0.45" stroke-dasharray="6,4" />
  <line x1="300" y1="155" x2="300" y2="218" stroke="#EF7B4D" stroke-width="2" stroke-opacity="0.45" stroke-dasharray="6,4" />
  <line x1="378" y1="148" x2="495" y2="218" stroke="#EF7B4D" stroke-width="2" stroke-opacity="0.45" stroke-dasharray="6,4" />
  <!-- Central ApplicationSet node -->
  <g filter="url(#glow)">
    <rect x="215" y="105" width="170" height="50" rx="10" ry="10" fill="url(#centralGrad)" />
    <text x="300" y="136" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">ApplicationSet</text>
  </g>

  <!-- Top-left App -->
  <g filter="url(#glowSmall)">
    <rect x="40" y="22" width="110" height="42" rx="8" ry="8" fill="url(#appGrad)" />
    <text x="95" y="49" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600">Application</text>
  </g>

  <!-- Top-center App -->
  <g filter="url(#glowSmall)">
    <rect x="245" y="8" width="110" height="42" rx="8" ry="8" fill="url(#appGrad)" />
    <text x="300" y="35" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600">Application</text>
  </g>

  <!-- Top-right App -->
  <g filter="url(#glowSmall)">
    <rect x="450" y="22" width="110" height="42" rx="8" ry="8" fill="url(#appGrad)" />
    <text x="505" y="49" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600">Application</text>
  </g>

  <!-- Bottom-left App -->
  <g filter="url(#glowSmall)">
    <rect x="40" y="198" width="110" height="42" rx="8" ry="8" fill="url(#appGrad)" />
    <text x="95" y="225" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600">Application</text>
  </g>

  <!-- Bottom-center App -->
  <g filter="url(#glowSmall)">
    <rect x="245" y="212" width="110" height="42" rx="8" ry="8" fill="url(#appGrad)" />
    <text x="300" y="239" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600">Application</text>
  </g>

  <!-- Bottom-right App -->
  <g filter="url(#glowSmall)">
    <rect x="450" y="198" width="110" height="42" rx="8" ry="8" fill="url(#appGrad)" />
    <text x="505" y="225" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600">Application</text>
  </g>
</svg>
