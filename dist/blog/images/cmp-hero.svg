<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="500" height="200" viewBox="0 0 500 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Repo Server Container -->
  <rect x="30" y="30" width="180" height="140" rx="12" ry="12" fill="#1a1d4e" stroke="#5e6294" stroke-width="2"/>
  <text x="120" y="60" text-anchor="middle" fill="#8b8fbd" font-family="monospace" font-size="11">argocd-repo-server</text>
  <!-- Inner Argo icon circle -->
  <circle cx="120" cy="110" r="35" fill="none" stroke="#ef7b4d" stroke-width="2" opacity="0.6"/>
  <circle cx="120" cy="110" r="22" fill="#ef7b4d" opacity="0.15"/>
  <!-- Simplified Argo squid silhouette -->
  <ellipse cx="120" cy="105" rx="12" ry="14" fill="#ef7b4d" opacity="0.8"/>
  <circle cx="114" cy="101" r="3" fill="#fff" opacity="0.9"/>
  <circle cx="126" cy="101" r="3" fill="#fff" opacity="0.9"/>
  <circle cx="114" cy="101" r="1.5" fill="#1a1d4e"/>
  <circle cx="126" cy="101" r="1.5" fill="#1a1d4e"/>
  <path d="M115 114 Q120 120 125 114" fill="none" stroke="#fff" stroke-width="1.2" opacity="0.7"/>
  <!-- Tentacle lines -->
  <path d="M112 118 L108 135" stroke="#ef7b4d" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  <path d="M120 120 L120 138" stroke="#ef7b4d" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  <path d="M128 118 L132 135" stroke="#ef7b4d" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>

  <!-- Connection arrows -->
  <line x1="215" y1="85" x2="270" y2="85" stroke="#5e6294" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="270,80 280,85 270,90" fill="#5e6294"/>
  <line x1="215" y1="115" x2="270" y2="115" stroke="#5e6294" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="270,110 280,115 270,120" fill="#5e6294"/>

  <!-- CMP Sidecar 1 -->
  <rect x="285" y="25" width="180" height="60" rx="10" ry="10" fill="#1e3a2a" stroke="#4ade80" stroke-width="2"/>
  <text x="375" y="50" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="11">CMP Sidecar</text>
  <text x="375" y="70" text-anchor="middle" fill="#86efac" font-family="monospace" font-size="10" opacity="0.8">yq-plugin</text>

  <!-- CMP Sidecar 2 -->
  <rect x="285" y="95" width="180" height="60" rx="10" ry="10" fill="#2a1e3a" stroke="#c084fc" stroke-width="2"/>
  <text x="375" y="120" text-anchor="middle" fill="#c084fc" font-family="monospace" font-size="11">CMP Sidecar</text>
  <text x="375" y="140" text-anchor="middle" fill="#d8b4fe" font-family="monospace" font-size="10" opacity="0.8">tanka-plugin</text>

  <!-- Shared Volume indicator -->
  <rect x="225" y="165" width="120" height="28" rx="6" ry="6" fill="#1a1d4e" stroke="#5e6294" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="285" y="183" text-anchor="middle" fill="#8b8fbd" font-family="monospace" font-size="9">shared: /tmp/repo</text>

  <!-- Volume connection lines -->
  <line x1="120" y1="170" x2="225" y2="179" stroke="#5e6294" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="375" y1="155" x2="345" y2="165" stroke="#5e6294" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
</svg>
